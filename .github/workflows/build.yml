name: Build Electron App

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Download Cloudflare WARP MSI (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          mkdir -p resources
          curl -L -o resources/Cloudflare_WARP_Release-x64.msi https://1111-releases.cloudflareclient.com/windows/Cloudflare_WARP_Release-x64.msi

      - name: Build Application
        run: npm run dist

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: NexusVPN-${{ matrix.os }}
          path: |
            release/*.exe
            release/*.AppImage
            release/*.deb
          if-no-files-found: warn
